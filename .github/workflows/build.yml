name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build (Linux x64)
    # Linux-only: the security posture depends on seccomp-bpf (Linux),
    # and the integration tests drive the binary via forkpty (Unix pty).
    # README documents non-Linux as a deliberately degraded mode.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Verify Rust installation
        run: |
          rustc --version
          cargo --version

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-${{ hashFiles('**/Cargo.lock') }}

      # --- Security gates -------------------------------------------------
      # These mirror the "Automated checks" table in README.md. Any one of
      # them failing must block the build — they're load-bearing for the
      # security claims, not informational.

      - name: cargo-audit (RustSec advisories)
        run: |
          cargo install cargo-audit --locked
          cargo audit

      - name: cargo-deny (banned crates + licenses)
        run: |
          cargo install cargo-deny --locked
          cargo deny check bans
          cargo deny check licenses

      - name: clippy (-D warnings)
        run: cargo clippy --release --all-targets -- -D warnings

      # --- Build + test ---------------------------------------------------

      - name: Build release binary
        run: cargo build --release

      - name: Run integration tests
        run: cargo test --release

      - name: Sandbox selftest
        # Confirms the seccomp filter is actually installed and that both
        # socket(AF_INET) and io_uring_setup return EACCES. A regression
        # in this output is a regression in the network-isolation claim.
        run: ./target/release/kpcli-rust selftest

      - name: Verify binary mode
        run: |
          ls -lh target/release/kpcli-rust
          file target/release/kpcli-rust || true

      # --- Attribution + SBOM --------------------------------------------

      - name: Install cargo-about
        run: cargo install cargo-about --features cli --locked

      - name: Generate THIRD_PARTY_LICENSES.txt
        run: cargo about generate about.hbs -o THIRD_PARTY_LICENSES.txt

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate SBOM (CycloneDX 1.5 JSON)
        run: cargo cyclonedx --format json --spec-version 1.5

      # --- Stage and upload artifacts ------------------------------------

      - name: Stage artifacts
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          ARTIFACT_DIR="artifacts/kpcli-rust-linux-x64-${VERSION}"
          mkdir -p "${ARTIFACT_DIR}"
          cp target/release/kpcli-rust "${ARTIFACT_DIR}/"
          cp README.md LICENSE "${ARTIFACT_DIR}/"
          cp THIRD_PARTY_LICENSES.txt "${ARTIFACT_DIR}/"
          cp kpcli-rust.cdx.json "${ARTIFACT_DIR}/"
          echo "=== Artifacts staged ==="
          ls -lhR "${ARTIFACT_DIR}/"
          echo "ARTIFACT_DIR=${ARTIFACT_DIR}" >> $GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kpcli-rust-linux-x64-${{ steps.version.outputs.VERSION }}
          path: ${{ env.ARTIFACT_DIR }}
          retention-days: 30

  package:
    name: Package release
    needs: build
    runs-on: ubuntu-22.04
    if: >-
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: kpcli-rust-linux-x64-${{ steps.version.outputs.VERSION }}
          path: artifacts/kpcli-rust-linux-x64-${{ steps.version.outputs.VERSION }}

      - name: Create tarball
        run: |
          cd artifacts
          tar -czf "kpcli-rust-linux-x64-${{ steps.version.outputs.VERSION }}.tar.gz" \
              "kpcli-rust-linux-x64-${{ steps.version.outputs.VERSION }}"

      - name: Build deb package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          PKG_DIR="kpcli-rust_${VERSION}_amd64"
          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/doc/kpcli-rust"

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: kpcli-rust
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Brandon Arrendondo <barrendo@gmail.com>
          Homepage: https://github.com/szarta/kpcli-rust
          Description: Offline-only command-line KeePass (KDBX4) client
           kpcli-rust is an offline KeePass KDBX4 password-store CLI with a
           seccomp-bpf network sandbox, audited dependency tree, and no
           on-disk usage trace. The shipped binary opens a network socket
           exactly never.
          EOF
          sed -i 's/^          //' "${PKG_DIR}/DEBIAN/control"

          cp "artifacts/kpcli-rust-linux-x64-${VERSION}/kpcli-rust" "${PKG_DIR}/usr/bin/"
          chmod 755 "${PKG_DIR}/usr/bin/kpcli-rust"

          cp README.md "${PKG_DIR}/usr/share/doc/kpcli-rust/"
          cp LICENSE "${PKG_DIR}/usr/share/doc/kpcli-rust/copyright"
          cp "artifacts/kpcli-rust-linux-x64-${VERSION}/THIRD_PARTY_LICENSES.txt" \
             "${PKG_DIR}/usr/share/doc/kpcli-rust/"
          cp "artifacts/kpcli-rust-linux-x64-${VERSION}/kpcli-rust.cdx.json" \
             "${PKG_DIR}/usr/share/doc/kpcli-rust/"

          dpkg-deb --build --root-owner-group "${PKG_DIR}"
          mv "${PKG_DIR}.deb" "artifacts/"
          echo "=== deb package ==="
          dpkg-deb --info "artifacts/${PKG_DIR}.deb"

      - name: Build rpm package
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"

          mkdir -p rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          TARDIR="kpcli-rust-${VERSION}"
          mkdir -p "${TARDIR}/bin" "${TARDIR}/doc"
          cp "artifacts/kpcli-rust-linux-x64-${VERSION}/kpcli-rust" "${TARDIR}/bin/"
          cp README.md "${TARDIR}/doc/"
          cp LICENSE "${TARDIR}/doc/"
          cp "artifacts/kpcli-rust-linux-x64-${VERSION}/THIRD_PARTY_LICENSES.txt" "${TARDIR}/doc/"
          cp "artifacts/kpcli-rust-linux-x64-${VERSION}/kpcli-rust.cdx.json" "${TARDIR}/doc/"
          tar -czf "rpmbuild/SOURCES/kpcli-rust-${VERSION}.tar.gz" "${TARDIR}"
          rm -rf "${TARDIR}"

          cat > rpmbuild/SPECS/kpcli-rust.spec << 'SPEC_EOF'
          Name:           kpcli-rust
          Version:        VERSION_PLACEHOLDER
          Release:        1%{?dist}
          Summary:        Offline-only command-line KeePass (KDBX4) client
          License:        MIT
          URL:            https://github.com/szarta/kpcli-rust
          Source0:        %{name}-%{version}.tar.gz

          %description
          kpcli-rust is an offline KeePass KDBX4 password-store CLI with a
          seccomp-bpf network sandbox, audited dependency tree, and no
          on-disk usage trace. The shipped binary opens a network socket
          exactly never.

          %prep
          %setup -q

          %install
          mkdir -p %{buildroot}%{_bindir}
          mkdir -p %{buildroot}%{_docdir}/%{name}
          install -m 755 bin/kpcli-rust %{buildroot}%{_bindir}/kpcli-rust
          install -m 644 doc/README.md %{buildroot}%{_docdir}/%{name}/README.md
          install -m 644 doc/LICENSE %{buildroot}%{_docdir}/%{name}/LICENSE
          install -m 644 doc/THIRD_PARTY_LICENSES.txt %{buildroot}%{_docdir}/%{name}/THIRD_PARTY_LICENSES.txt
          install -m 644 doc/kpcli-rust.cdx.json %{buildroot}%{_docdir}/%{name}/kpcli-rust.cdx.json

          %files
          %{_bindir}/kpcli-rust
          %doc %{_docdir}/%{name}/README.md
          %doc %{_docdir}/%{name}/THIRD_PARTY_LICENSES.txt
          %doc %{_docdir}/%{name}/kpcli-rust.cdx.json
          %license %{_docdir}/%{name}/LICENSE
          SPEC_EOF

          sed -i 's/^          //' rpmbuild/SPECS/kpcli-rust.spec
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/" rpmbuild/SPECS/kpcli-rust.spec

          rpmbuild --define "_topdir $(pwd)/rpmbuild" -bb rpmbuild/SPECS/kpcli-rust.spec
          cp rpmbuild/RPMS/x86_64/kpcli-rust-*.rpm artifacts/
          echo "=== rpm package ==="
          rpm -qip artifacts/kpcli-rust-*.rpm

      - name: Upload release archives
        uses: actions/upload-artifact@v4
        with:
          name: release-packages-${{ steps.version.outputs.VERSION }}
          path: |
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/*.rpm
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/*.rpm
