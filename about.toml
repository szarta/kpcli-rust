# cargo-about config. The accepted list intentionally mirrors the
# `[licenses].allow` set in deny.toml so the two enforce the same view
# of what's permissible in the dep tree.

accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
]
