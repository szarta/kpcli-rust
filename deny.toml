# cargo-deny config for kpcli-rust.
# Enforces the "no network" invariant by banning crates that perform HTTP,
# TLS, or asynchronous socket I/O. Run:  cargo deny check bans

[graph]
all-features = false

[bans]
multiple-versions = "warn"
wildcards = "deny"

# Any of these in the dependency tree should be considered a regression.
deny = [
    # HTTP clients / servers
    { name = "reqwest" },
    { name = "ureq" },
    { name = "isahc" },
    { name = "surf" },
    { name = "curl" },
    { name = "curl-sys" },
    { name = "hyper" },
    { name = "hyper-util" },
    { name = "h2" },
    { name = "h3" },
    { name = "actix-web" },
    { name = "actix-http" },
    { name = "rocket" },
    { name = "warp" },
    { name = "axum" },
    { name = "tide" },
    { name = "tonic" },
    # async runtimes / socket I/O
    { name = "tokio" },
    { name = "async-std" },
    { name = "smol" },
    { name = "mio" },
    { name = "socket2" },
    # TLS stacks
    { name = "rustls" },
    { name = "native-tls" },
    { name = "openssl" },
    { name = "openssl-sys" },
    { name = "boring" },
    { name = "boring-sys" },
    { name = "schannel" },
    # DNS
    { name = "trust-dns-resolver" },
    { name = "hickory-resolver" },
    { name = "hickory-proto" },
    { name = "domain" },
    # gRPC / messaging
    { name = "prost" },
    { name = "tower" },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "BSL-1.0",
]

[advisories]
yanked = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
